name: keeper

services:
  redis:
    image: redis:7-alpine
    container_name: keeper-redis
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    env_file: .env
    volumes:
      - redis-data:/data
    restart: unless-stopped

  api:
    image: ghcr.io/ridafkih/keeper-api:latest
    container_name: keeper-api
    env_file: .env
    environment:
      API_PORT: "3001"
      ENV: production
    depends_on:
      - redis
    restart: unless-stopped

  cron:
    image: ghcr.io/ridafkih/keeper-cron:latest
    container_name: keeper-cron
    env_file: .env
    environment:
      ENV: production
    depends_on:
      - api
    restart: unless-stopped

  web:
    image: ghcr.io/ridafkih/keeper-web:latest
    container_name: keeper-web
    env_file: .env
    environment:
      VITE_API_URL: http://api:3001
      PORT: "3000"
      ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis-data:
